name: Refresh Model Capabilities

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    if: github.repository == 'code-yeongyu/oh-my-openagent'
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Refresh bundled model capabilities snapshot
        run: bun run build:model-capabilities

      - name: Validate capability guardrails
        run: bun run test:model-capabilities

      - name: Create refresh pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: refresh model capabilities snapshot"
          title: "chore: refresh model capabilities snapshot"
          body: |
            Automated refresh of `packages/omo-opencode/src/generated/model-capabilities.generated.json` from `https://models.dev/api.json`.

            This keeps the bundled capability snapshot aligned with upstream model metadata without relying on manual refreshes.
          branch: automation/refresh-model-capabilities
          delete-branch: true
          labels: |
            maintenance

      - name: Write job summary
        if: always()
        shell: bash
        env:
          JOB_SUMMARY_TITLE: Model capability refresh
          JOB_SUMMARY_STATUS: ${{ job.status }}
          JOB_SUMMARY_DETAILS: |
            - Refreshes the bundled model capability snapshot.
            - Runs model capability guardrail tests.
            - Opens or updates the automated refresh pull request.
          JOB_SUMMARY_NEXT: Check snapshot generation first, then guardrail failures or create-pull-request output.
        run: GITHUB_STEP_SUMMARY="$GITHUB_STEP_SUMMARY" bash .github/scripts/write-job-summary.sh
