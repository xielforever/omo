name: LazyCodex Labels

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ensure-label:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure LazyCodex labels
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL_NAME: "lazycodex"
          GENERATED_LABEL_NAME: "lazycodex-generated"
        run: |
          set -euo pipefail

          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"
            local error_file="/tmp/${name}-label-error.log"

            if gh label create "$name" --repo "$GITHUB_REPOSITORY" --color "$color" --description "$description" 2>"$error_file"; then
              return 0
            fi

            if grep -qi "already exists" "$error_file"; then
              gh label edit "$name" --repo "$GITHUB_REPOSITORY" --color "$color" --description "$description"
              return 0
            fi

            cat "$error_file" >&2
            return 1
          }

          ensure_label "$LABEL_NAME" "7C3AED" "LazyCodex and omo-codex related work"
          ensure_label "$GENERATED_LABEL_NAME" "22C55E" "Reports and pull requests generated by LazyCodex"

  label-pull-request:
    runs-on: ubuntu-latest
    needs: [ensure-label]
    if: github.event_name == 'pull_request_target'
    steps:
      - name: Add label when LazyCodex-owned files change
        env:
          GH_TOKEN: ${{ github.token }}
          GENERATED_LABEL_NAME: "lazycodex-generated"
          LABEL_NAME: "lazycodex"
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          is_lazycodex_path() {
            case "$1" in
              packages/omo-codex/*) return 0 ;;
              packages/shared-skills/*) return 0 ;;
              packages/git-bash-mcp/*) return 0 ;;
              packages/lsp-tools-mcp/*) return 0 ;;
              packages/omo-opencode/src/cli/install-codex/*) return 0 ;;
              script/*lazycodex*) return 0 ;;
              docs/reference/lazycodex-*) return 0 ;;
              docs/*lazycodex*) return 0 ;;
              .github/workflows/publish.yml) return 0 ;;
              package.json) return 0 ;;
              bin/*) return 0 ;;
              *) return 1 ;;
            esac
          }

          while IFS= read -r path; do
            if is_lazycodex_path "$path"; then
              gh pr edit "$PR_NUMBER" --add-label "$LABEL_NAME" --repo "$GITHUB_REPOSITORY"
              break
            fi
          done < <(gh pr diff "$PR_NUMBER" --name-only --repo "$GITHUB_REPOSITORY")

          pr_text="$(printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" | tr '[:upper:]' '[:lower:]')"
          case "$pr_text" in
            *lazycodex-generated*|*"this pr was generated by lazycodex"*)
              echo "This PR was generated by LazyCodex."
              gh pr edit "$PR_NUMBER" --add-label "$GENERATED_LABEL_NAME" --repo "$GITHUB_REPOSITORY"
              ;;
            *)
              echo "PR is not marked as generated by LazyCodex."
              ;;
          esac

  label-issue:
    runs-on: ubuntu-latest
    needs: [ensure-label]
    if: github.event_name == 'issues'
    steps:
      - name: Add label when issue mentions LazyCodex
        env:
          GH_TOKEN: ${{ github.token }}
          GENERATED_LABEL_NAME: "lazycodex-generated"
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          LABEL_NAME: "lazycodex"
        run: |
          set -euo pipefail

          issue_text="$(printf '%s\n%s\n' "$ISSUE_TITLE" "$ISSUE_BODY" | tr '[:upper:]' '[:lower:]')"
          case "$issue_text" in
            *lazycodex-ai*|*omo-codex*|*"codex light"*|*lazycodex*)
              gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "$LABEL_NAME"
              ;;
            *)
              echo "Issue does not mention LazyCodex."
              ;;
          esac

          case "$issue_text" in
            *lazycodex-generated*|*"this issue was generated by lazycodex"*)
              gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --add-label "$GENERATED_LABEL_NAME"
              ;;
            *)
              echo "Issue is not marked as generated by LazyCodex."
              ;;
          esac
