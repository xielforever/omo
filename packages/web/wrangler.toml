main = ".open-next/worker.js"
name = "oh-my-openagent-web"
compatibility_date = "2026-05-18"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[routes]]
pattern = "omo.dev"
custom_domain = true

[[routes]]
pattern = "www.omo.dev"
custom_domain = true
